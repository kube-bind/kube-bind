version: 2
updates:
# Maintain dependencies for GitHub Actions
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
  groups:
    all-github-actions:
      patterns: [ "*" ]
# Go modules: root (konnector) and the sdk module.
- package-ecosystem: "gomod"
  directories:
    - "/"
    - "/sdk"
  schedule:
    interval: "weekly"
  groups:
    all-gomod:
      patterns: [ "*" ]
