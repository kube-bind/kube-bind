name: CI

on:
  push:
    branches:
      - main
      - v2-next
  pull_request:
    branches:
      - main
      - v2-next

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: v1.26.2
    - run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.3
    - run: make lint

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: v1.26.2
    - run: make build vet test
    # test-e2e downloads envtest binaries on demand via setup-envtest.
    - run: make test-e2e

  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: v1.26.2
    - run: make verify-boilerplate

  image-build:
    name: image-build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
    # Multi-arch build for all release architectures, without pushing.
    - name: Build konnector image (multi-arch, no push)
      run: |
        docker buildx build \
          --platform linux/amd64,linux/arm64 \
          --provenance=false \
          .
