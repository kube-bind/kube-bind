apiVersion: kube-bind.io/v1alpha2
kind: APIServiceExportRequest
metadata:
  name: sheriffs
spec:
  namespaces:
  - name: sheriff-operations
  - name: sheriff-intelligence
  permissionClaims:
  - resource: secrets
    selector:
      labelSelector:
        matchLabels:
          app: sheriff
          security: high
      namedResources:
      - name: sheriff-badge-credentials
      - name: sheriff-jurisdiction-config
  - resource: configmaps
    selector:
      labelSelector:
        matchLabels:
          app: sheriff
          component: enforcement
      namedResources:
      - name: sheriff-jurisdiction-map
      - name: sheriff-enforcement-rules
  resources:
  - group: wildwest.dev
    resource: sheriffs
    versions:
    - v1alpha1
status: {}
