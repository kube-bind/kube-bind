# Default values for kube-bind.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Number of replicas for the backend deployment
replicaCount: 1

# Backend configuration
backend:
  # -- Address the backend listens on
  listenAddress: "0.0.0.0:8080"
  # -- Path to a kubeconfig file. Only required if out-of-cluster
  kubeconfig: ""
  # -- The name of the kubeconfig context to use
  context: ""
  # -- External address clients use to reach the backend
  externalAddress: ""
  # -- External server name for TLS SNI
  externalServerName: ""
  # -- Logging verbosity level
  loggingLevel: 2
  # TLS configuration
  tls:
    # -- Enable TLS for the backend
    enabled: false
    # -- Name of the Kubernetes secret containing TLS certificate
    certSecretName: ""
    # -- Path to TLS certificate file inside the container
    tlsCertFile: "/etc/kube-bind/tls/tls.crt"
    # -- Path to TLS key file inside the container
    tlsKeyFile: "/etc/kube-bind/tls/tls.key"
  # OIDC configuration. Empty values will run the embedded OIDC server.
  oidc:
    # -- OIDC provider type. Options: "embedded" or "external"
    type: "embedded"
    # -- OIDC issuer URL (leave empty for embedded OIDC server)
    issuerUrl: ""
    # -- OIDC client ID
    clientId: ""
    # -- OIDC client secret (plaintext, prefer clientSecretName for production)
    # -- Not required for providers using PKCE or public clients
    clientSecret: ""
    # -- Name of the Kubernetes secret containing the OIDC client secret
    # -- If set, the secret will be mounted as OIDC_CLIENT_SECRET env var
    clientSecretName: ""
    # -- Key within the secret (e.g., "client-secret")
    clientSecretKey: ""
    # -- OIDC callback URL
    callbackUrl: ""
    # -- List of groups allowed to access bindings. With embedded OIDC, system:authenticated is added automatically
    allowedGroups: []
    # -- List of users allowed to access bindings
    allowedUsers: []

  # -- Human-readable name for this backend instance
  prettyName: ""
  # -- Prefix for namespaces created by kube-bind
  namespacePrefix: "kube-bind-"
  # -- Consumer scope. Options: "namespaced"
  consumerScope: "namespaced"
  # -- Cluster-scope isolation mode. Options: none, prefix, namespaced
  clusterScopeIsolation: "prefix"

  # -- Multicluster runtime provider (e.g., "kcp")
  multiclusterRuntimeProvider: ""
  # -- Schema source (e.g., "apiresourceschemas")
  schemaSource: ""
  # -- APIExport EndpointSlice name to watch
  apiexportEndpointSliceName: ""
  # -- Disable the frontend UI
  frontendDisabled: false
  # -- Name prefixes of APIBindings to ignore when generating APIServiceExportTemplates
  apibindingIgnorePrefixes: []
  # -- Extra command-line arguments to pass to the backend
  extraArgs: []

  # Session storage configuration
  sessionStorage:
    redisAddress: ""
    redisPassword: ""

  # Cookie configuration - these should be base64 encoded keys
  # -- Cookie signing key (base64 encoded). Empty generates random key on each start (not for production!)
  cookieSigningKey: ""
  # -- Cookie encryption key (base64 encoded). Empty generates random key on each start (not for production!)
  cookieEncryptionKey: ""

# Cert-manager configuration
certManager:
  # -- Enable cert-manager integration for automatic TLS certificates
  enabled: false
  # -- Name of the ClusterIssuer to use
  clusterIssuer: ""

# Gateway API configuration
gatewayApi:
  # -- Enable Gateway API resources
  enabled: false
  gateway:
    # -- Gateway class name
    className: ""
    # -- HTTP listener port
    httpPort: 80
    # -- HTTPS listener port
    httpsPort: 443
    # -- Annotations to add to the Gateway resource
    annotations: {}
    tls:
      # -- TLS certificate references for the Gateway
      # @default -- `[]`
      certificateRefs: []
      # Example:
      # - name: tls-cert
      #   namespace: default
  route:
    # -- Hostnames for the HTTPRoute
    # @default -- `[]`
    hostnames: []
    # Example:
    # - "example.com"
    # - "api.example.com"
    # -- Path match for the HTTPRoute
    path: "/"
    # -- Path match type for the HTTPRoute
    pathType: "PathPrefix"
    # -- Annotations to add to the HTTPRoute resource
    annotations: {}

examples:
  # -- Enable example resources to seed on first start
  enabled: false

# Container image configuration
image:
  # -- Image repository
  repository: ghcr.io/kube-bind/backend
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion
  tag: ""

# -- Secrets for pulling images from a private repository
imagePullSecrets: []
# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# Service account configuration
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Automatically mount the ServiceAccount's API credentials
  automount: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use. If not set and create is true, a name is generated using the fullname template
  name: ""

# RBAC configuration
rbac:
  # -- Specifies whether RBAC resources should be created
  create: true

# -- Annotations to add to the pod
podAnnotations: {}
# -- Labels to add to the pod
podLabels: {}

# -- Pod security context
podSecurityContext: {}
  # fsGroup: 2000

# -- Host aliases for /etc/hosts injection into pods
# @default -- `[]`
hostAliases: []
# Example:
# - ip: "127.0.0.1"
#   hostnames:
#     - "example.local"

# -- Container security context
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Service configuration
service:
  # -- Service type
  type: ClusterIP
  # -- HTTP service port
  port: 8080
  # -- HTTPS service port
  httpsPort: 8443
  # -- NodePort for HTTP (only used when type is NodePort)
  nodePort: ""
  # -- NodePort for HTTPS (only used when type is NodePort)
  httpsNodePort: ""

# -- Resource requests and limits
resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# -- Liveness probe configuration
livenessProbe:
  httpGet:
    path: /healthz
    port: http
# -- Readiness probe configuration
readinessProbe:
  httpGet:
    path: /healthz
    port: http

# Autoscaling configuration
autoscaling:
  # -- Enable horizontal pod autoscaling
  enabled: false
  # -- Minimum number of replicas
  minReplicas: 1
  # -- Maximum number of replicas
  maxReplicas: 100
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# -- Additional init containers
# @default -- `[]`
initContainers: []
# - name: init
#   image: ghcr.io/platform-mesh/kube-bind-provider-init:latest
#   args: ["--kcp-kubeconfig", "/etc/kube-bind/kubeconfig"]

# -- Additional volumes on the output Deployment definition
# @default -- `[]`
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# -- Additional volumeMounts on the output Deployment definition
# @default -- `[]`
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}
