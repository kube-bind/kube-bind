---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: clusterbindings.core.kube-bind.io
spec:
  group: core.kube-bind.io
  names:
    categories:
    - kube-bind
    kind: ClusterBinding
    listKind: ClusterBindingList
    plural: clusterbindings
    singular: clusterbinding
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.connectionRef.name
      name: Connection
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ClusterBinding activates instance sync for one or more exported APIs
          cluster-wide. Cluster-scoped, following the ClusterRole convention.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              BindingSpec is the spec shared by ClusterBinding and Binding. The only
              difference between the two kinds is scope (cluster-wide vs. one namespace),
              which is expressed by the kind, not by a field.
            properties:
              apis:
                description: apis lists one or more exported CRDs to sync, by CRD
                  name on the provider.
                items:
                  description: |-
                    APIRef identifies an exported API by its CRD name on the provider,
                    i.e. "<plural>.<group>" (for example "mangodbs.mangodb.io"). Under the
                    OpenAPI schema source there is no CRD object behind the name; it is still
                    just resource + group.
                  properties:
                    name:
                      description: name is the CRD name of the exported API, "<plural>.<group>".
                      minLength: 1
                      type: string
                  required:
                  - name
                  type: object
                minItems: 1
                type: array
              conflictPolicy:
                default: Fail
                description: |-
                  conflictPolicy controls what happens when a target object already exists.
                  Fail (default) leaves a foreign object untouched and records a conflict;
                  Adopt takes ownership of an un-owned object. Adopt never steals an object
                  already carrying another binding's/consumer's markers.
                enum:
                - Fail
                - Adopt
                type: string
              connectionRef:
                description: |-
                  connectionRef points at the Connection that provides the provider link
                  and credentials for the listed APIs.
                properties:
                  name:
                    description: name of the Connection.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              relatedResources:
                description: |-
                  relatedResources are Secrets/ConfigMaps synced alongside instances of the
                  bound APIs. Not yet synced in the alpha POC.
                items:
                  description: |-
                    RelatedResource selects auxiliary objects (Secrets/ConfigMaps) to sync
                    alongside the bound instances.
                  properties:
                    direction:
                      description: direction the related resource flows.
                      enum:
                      - FromProvider
                      - FromConsumer
                      type: string
                    group:
                      default: ""
                      description: group of the related resource. Empty string for
                        the core group.
                      type: string
                    resource:
                      description: |-
                        resource is the plural resource name. Only "secrets" and "configmaps"
                        are permitted in core.
                      enum:
                      - secrets
                      - configmaps
                      type: string
                    selector:
                      description: |-
                        selector restricts which objects are synced. Only labelSelector and
                        named selectors are supported in core (no JSONPath reference-following).
                      properties:
                        labelSelector:
                          description: labelSelector selects related objects by label.
                          properties:
                            matchExpressions:
                              description: matchExpressions is a list of label selector
                                requirements. The requirements are ANDed.
                              items:
                                description: |-
                                  A label selector requirement is a selector that contains values, a key, and an operator that
                                  relates the key and values.
                                properties:
                                  key:
                                    description: key is the label key that the selector
                                      applies to.
                                    type: string
                                  operator:
                                    description: |-
                                      operator represents a key's relationship to a set of values.
                                      Valid operators are In, NotIn, Exists and DoesNotExist.
                                    type: string
                                  values:
                                    description: |-
                                      values is an array of string values. If the operator is In or NotIn,
                                      the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                      the values array must be empty. This array is replaced during a strategic
                                      merge patch.
                                    items:
                                      type: string
                                    type: array
                                    x-kubernetes-list-type: atomic
                                required:
                                - key
                                - operator
                                type: object
                              type: array
                              x-kubernetes-list-type: atomic
                            matchLabels:
                              additionalProperties:
                                type: string
                              description: |-
                                matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                                map is equivalent to an element of matchExpressions, whose key field is "key", the
                                operator is "In", and the values array contains only "value". The requirements are ANDed.
                              type: object
                          type: object
                          x-kubernetes-map-type: atomic
                        names:
                          description: names selects related objects by exact name.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: set
                      type: object
                  required:
                  - direction
                  - group
                  - resource
                  type: object
                type: array
                x-kubernetes-list-type: atomic
            required:
            - apis
            - connectionRef
            type: object
          status:
            description: BindingStatus is the observed state shared by ClusterBinding
              and Binding.
            properties:
              boundAPIs:
                description: boundAPIs is per-API observed state.
                items:
                  description: BoundAPI is the per-API observed state recorded on
                    a binding's status.
                  properties:
                    conflictCount:
                      description: |-
                        conflictCount is the number of objects skipped due to foreign ownership.
                        Per-object detail lives on each object's own condition, not here.
                      format: int32
                      type: integer
                    crdHash:
                      description: |-
                        crdHash is a hash of the schema currently applied on the consumer for
                        this API. Empty until the schema has been installed.
                      type: string
                    name:
                      description: name is the CRD name of the bound API, "<plural>.<group>".
                      type: string
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-type: atomic
              conditions:
                description: 'conditions: Connected, Synced, Conflicts, PermissionDenied,
                  Ready.'
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
