---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: connections.core.kube-bind.io
spec:
  group: core.kube-bind.io
  names:
    categories:
    - kube-bind
    kind: Connection
    listKind: ConnectionList
    plural: connections
    singular: connection
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .spec.kubeconfigSecretRef.name
      name: Secret
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Connection is the link to one provider cluster. It owns the credentials and
          schema delivery, and surfaces what the provider exports. Cluster-scoped.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ConnectionSpec defines the desired provider link.
            properties:
              autoBind:
                default: false
                description: |-
                  autoBind, when true, makes the konnector maintain a managed ClusterBinding
                  (named after this Connection) covering all exported APIs.
                type: boolean
              kubeconfigSecretRef:
                description: |-
                  kubeconfigSecretRef points at the Secret holding the provider kubeconfig.
                  Immutable. The only credential reference in the core.
                properties:
                  key:
                    default: kubeconfig
                    description: key within the Secret holding the kubeconfig.
                    type: string
                  name:
                    description: name of the Secret.
                    minLength: 1
                    type: string
                  namespace:
                    description: namespace of the Secret. Must be the konnector's
                      designated namespace.
                    minLength: 1
                    type: string
                required:
                - name
                - namespace
                type: object
                x-kubernetes-validations:
                - message: kubeconfigSecretRef is immutable
                  rule: self == oldSelf
              schema:
                default: {}
                description: schema controls how exported APIs reach the consumer.
                properties:
                  pullPolicy:
                    default: Bound
                    description: |-
                      pullPolicy selects which exported APIs are installed:
                        Bound - only APIs referenced by a Binding/ClusterBinding (default).
                        All   - every exported API readable by the credentials.
                        None  - never install CRDs (user/extension manages them).
                    enum:
                    - Bound
                    - All
                    - None
                    type: string
                  source:
                    default: Auto
                    description: |-
                      source selects how schemas are obtained:
                        Auto    - CRD if readable on the provider, else OpenAPI (default).
                        CRD     - read apiextensions CRDs verbatim.
                        OpenAPI - synthesize CRDs from discovery + /openapi/v3.
                    enum:
                    - Auto
                    - CRD
                    - OpenAPI
                    type: string
                  updatePolicy:
                    default: Always
                    description: |-
                      updatePolicy selects whether installed schemas follow provider changes:
                        Always - follow provider schema changes (default).
                        Once   - pin at first pull.
                    enum:
                    - Always
                    - Once
                    type: string
                type: object
            required:
            - kubeconfigSecretRef
            type: object
          status:
            description: ConnectionStatus is the observed state of a Connection.
            properties:
              activeSchemaSource:
                description: |-
                  activeSchemaSource is the schema source actually in effect after resolving
                  "Auto" (CRD or OpenAPI). The binding uses it to decide whether the
                  Connection already installed the CRDs (OpenAPI) or it should pull them (CRD).
                type: string
              conditions:
                description: 'conditions: SecretValid, Connected, SchemaInSync, Ready.'
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              exportedAPIs:
                description: 'exportedAPIs is the discovery result: APIs exported
                  to these credentials.'
                items:
                  description: ExportedAPI describes one API the provider exports
                    to these credentials.
                  properties:
                    group:
                      description: group of the exported API.
                      type: string
                    name:
                      description: name is the CRD name of the exported API, "<plural>.<group>".
                      type: string
                    resource:
                      description: resource is the plural resource name of the exported
                        API.
                      type: string
                    scope:
                      description: scope is whether the API is Namespaced or Cluster
                        scoped.
                      type: string
                    versions:
                      description: versions are the served versions of the exported
                        API.
                      items:
                        type: string
                      type: array
                      x-kubernetes-list-type: set
                  required:
                  - group
                  - name
                  - resource
                  - scope
                  - versions
                  type: object
                type: array
                x-kubernetes-list-type: atomic
              localClusterUID:
                description: |-
                  localClusterUID is the identity of the consumer cluster, pinned on first
                  connect and immutable thereafter.
                type: string
                x-kubernetes-validations:
                - message: localClusterUID is immutable
                  rule: self == oldSelf
              remoteClusterUID:
                description: |-
                  remoteClusterUID is the identity of the provider cluster, pinned on first
                  connect and immutable thereafter. A Secret later pointing at a different
                  cluster is rejected rather than silently re-homing synced objects.
                type: string
                x-kubernetes-validations:
                - message: remoteClusterUID is immutable
                  rule: self == oldSelf
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
