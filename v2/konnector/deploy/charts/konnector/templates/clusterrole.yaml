{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "konnector.fullname" . }}
  labels:
    {{- include "konnector.labels" . | nindent 4 }}
rules:
  # Core kbind objects the konnector reconciles (+ status, + finalizers).
  - apiGroups: ["core.kbind.io"]
    resources: ["connections", "clusterbindings", "bindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["core.kbind.io"]
    resources: ["connections/status", "clusterbindings/status", "bindings/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["core.kbind.io"]
    resources: ["connections/finalizers", "clusterbindings/finalizers", "bindings/finalizers"]
    verbs: ["update"]
  # CRDs: the konnector pulls/synthesizes and installs the bound APIs, stamps
  # markers, and adds/removes finalizers.
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Provider kubeconfig Secrets: read + finalizer (never deleted by the konnector).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Namespaces: read for cluster identity; create when materializing
  # related-resource copies into consumer namespaces.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create"]
  # Cluster identity on kcp-shaped consumers (best-effort; harmless if absent).
  - apiGroups: ["core.kcp.io"]
    resources: ["logicalclusters"]
    verbs: ["get", "list", "watch"]
  # Events emitted by the reconcilers (conflicts, permission denials).
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Instances of the bound APIs synced between consumer and provider. These are
  # open-ended (whatever providers export), so access is granted per
  # .Values.rbac.boundResourceGroups — default "*". Narrow it to the specific
  # provider API groups to reduce the blast radius.
  {{- with .Values.rbac.boundResourceGroups }}
  - apiGroups:
      {{- toYaml . | nindent 6 }}
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- end }}
{{- end }}
