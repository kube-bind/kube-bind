{{- if .Values.rbac.create }}
# Leader-election lease + bootstrap, scoped to the release namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "konnector.fullname" . }}-leaderelection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "konnector.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
{{- end }}
